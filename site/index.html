<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="static/favicon.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="static/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/timeago.js/dist/timeago.min.js"></script>
    <title>Lathala</title>
  </head>
  <body>
    <div id="app">
      <header class="top-bar">
        <div class="top-bar__spacer"></div>
        <span>LATHALA</span>
        <button class="hamburger-btn" id="hamburger-btn" aria-label="Open categories"><span></span><span></span><span></span></button>
      </header>

      <!-- Category Sidebar -->
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Categories</span>
          <button class="sidebar-close" id="sidebar-close" aria-label="Close">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="sidebar-tags" id="sidebar-tags"></div>
      </aside>

      <main class="feed" id="feed"></main>

      <nav class="bottom-nav">
        <a href="#" target="_blank" rel="noopener noreferrer" class="nav-btn" id="read-article-link" aria-disabled="true">
          <i class="fa-brands fa-readme"></i>
          <span>READ ARTICLE</span>
        </a>
      </nav>
    </div>
    <script src="static/app.js"></script>
  </body>
</html>
